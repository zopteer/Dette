<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mes Dettes">
<title>Mes Dettes</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0F0E0D;
  --bg2: #181714;
  --bg3: #211F1C;
  --surface: #2A2723;
  --ink: #F5F0E8;
  --ink2: #A09A90;
  --ink3: #5A5550;
  --accent: #E8A040;
  --green: #4CAF82;
  --red: #E05555;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: 'Instrument Sans', sans-serif;
  overflow: hidden;
}

/* ===== SCREENS ===== */
.screen {
  position: fixed;
  inset: 0;
  display: none;
  flex-direction: column;
  background: var(--bg);
}
.screen.active { display: flex; }

/* ===== TOP BAR ===== */
.topbar {
  padding: calc(var(--safe-top) + 14px) 20px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}
.topbar-title {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 700;
}
.topbar-title span { color: var(--accent); }

.icon-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  border: none;
  background: var(--surface);
  color: var(--ink);
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}

/* ===== SCROLL AREA ===== */
.scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--safe-bot) + 80px);
}

/* ===== HOME SCREEN ===== */
.home-banner {
  margin: 16px;
  background: rgba(232,160,64,0.1);
  border: 1px solid rgba(232,160,64,0.2);
  border-radius: 16px;
  padding: 18px 20px;
}
.home-banner-lbl { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
.home-banner-val { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 700; color: var(--ink); }
.home-banner-sub { font-size: 12px; color: var(--ink2); margin-top: 4px; }

.section-title {
  font-size: 11px; font-weight: 600; letter-spacing: .08em;
  text-transform: uppercase; color: var(--ink3);
  padding: 0 16px 8px;
}

.person-card {
  display: flex; align-items: center; gap: 12px;
  background: var(--bg2);
  border-radius: 14px;
  margin: 0 16px 8px;
  padding: 14px 16px;
  cursor: pointer;
  transition: background .15s;
  border: 1px solid rgba(255,255,255,0.05);
}
.person-card:active { background: var(--bg3); }

.av {
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
  flex-shrink: 0;
}

.pc-info { flex: 1; overflow: hidden; }
.pc-name { font-size: 15px; font-weight: 500; color: var(--ink); }
.pc-bal { font-size: 12px; margin-top: 2px; }
.pc-bal.owed { color: var(--accent); }
.pc-bal.clear { color: var(--green); }

.pc-right { text-align: right; flex-shrink: 0; }
.pc-amt { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--accent); }
.pc-amt.clear { color: var(--green); font-size: 13px; }
.chevron { color: var(--ink3); font-size: 16px; margin-left: 6px; }

.empty-state {
  text-align: center; padding: 60px 32px;
  color: var(--ink3);
}
.empty-ico { font-size: 52px; display: block; margin-bottom: 16px; }
.empty-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--ink2); margin-bottom: 8px; }
.empty-sub { font-size: 13px; line-height: 1.5; }

/* FAB */
.fab {
  position: fixed;
  bottom: calc(var(--safe-bot) + 20px);
  right: 20px;
  width: 58px; height: 58px;
  border-radius: 50%;
  background: var(--accent);
  color: var(--bg);
  border: none;
  font-size: 28px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(232,160,64,0.4);
  transition: transform .15s;
  z-index: 50;
}
.fab:active { transform: scale(0.93); }

/* ===== DETAIL SCREEN ===== */
.detail-hero {
  padding: 20px 20px 16px;
  display: flex; align-items: center; gap: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}
.detail-av {
  width: 52px; height: 52px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700;
}
.detail-name { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; }
.detail-since { font-size: 11px; color: var(--ink3); margin-top: 2px; }

.stats-grid {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 1px; background: rgba(255,255,255,0.06);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}
.stat { background: var(--bg); padding: 14px 12px; text-align: center; }
.stat-lbl { font-size: 9px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--ink3); margin-bottom: 5px; }
.stat-val { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; }
.stat-val.lent { color: var(--ink); }
.stat-val.repaid { color: var(--green); }
.stat-val.rem { color: var(--accent); }

.prog-wrap { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
.prog-top { display: flex; justify-content: space-between; margin-bottom: 7px; }
.prog-lbl { font-size: 11px; color: var(--ink3); }
.prog-pct { font-size: 11px; font-weight: 600; color: var(--green); }
.prog-bar { height: 6px; background: var(--surface); border-radius: 100px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg,#4CAF82,#7AE0A8); border-radius: 100px; transition: width .5s; }

/* ACTION BUTTONS */
.action-row {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; padding: 14px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}
.btn-lend {
  background: rgba(232,160,64,0.12);
  border: 1px solid rgba(232,160,64,0.25);
  border-radius: 12px; padding: 13px 10px;
  font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
  color: var(--accent); cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: all .2s;
}
.btn-lend:active { background: var(--accent); color: var(--bg); }
.btn-repay {
  background: rgba(76,175,130,0.1);
  border: 1px solid rgba(76,175,130,0.25);
  border-radius: 12px; padding: 13px 10px;
  font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
  color: var(--green); cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: all .2s;
}
.btn-repay:active { background: var(--green); color: var(--bg); }

/* TX LIST */
.tx-section { padding: 16px 16px 0; }
.tx-sec-title { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--ink3); margin-bottom: 10px; }

.tx {
  display: flex; align-items: center; gap: 12px;
  background: var(--bg2); border-radius: 12px;
  padding: 12px 14px; margin-bottom: 8px;
  border: 1px solid rgba(255,255,255,0.05);
}
.tx-ico {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.tx-ico.lend { background: rgba(232,160,64,0.12); }
.tx-ico.repay { background: rgba(76,175,130,0.12); }
.tx-info { flex: 1; overflow: hidden; }
.tx-note { font-size: 14px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-date { font-size: 11px; color: var(--ink3); margin-top: 2px; }
.tx-amt { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; white-space: nowrap; }
.tx-amt.lend { color: var(--accent); }
.tx-amt.lend::before { content: '+ '; }
.tx-amt.repay { color: var(--green); }
.tx-amt.repay::before { content: '− '; }
.tx-del {
  background: transparent; border: none; color: var(--ink3);
  font-size: 16px; cursor: pointer; padding: 4px 8px;
  border-radius: 6px; flex-shrink: 0;
}
.tx-del:active { color: var(--red); background: rgba(224,85,85,0.12); }

.no-tx { font-size: 13px; color: var(--ink3); padding: 8px 0 16px; }

.cleared {
  margin: 0 16px 8px;
  background: rgba(76,175,130,0.1); border: 1px solid rgba(76,175,130,0.2);
  border-radius: 12px; padding: 12px 16px;
  display: flex; align-items: center; gap: 10px;
  font-size: 14px; font-weight: 500; color: var(--green);
}

.del-person-btn {
  margin: 20px 16px 0;
  width: calc(100% - 32px);
  background: rgba(224,85,85,0.08);
  border: 1px solid rgba(224,85,85,0.2);
  border-radius: 12px; padding: 13px;
  font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
  color: var(--red); cursor: pointer;
}
.del-person-btn:active { background: rgba(224,85,85,0.2); }

/* ===== BOTTOM SHEET ===== */
.sheet-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  display: none;
  align-items: flex-end;
  backdrop-filter: blur(4px);
}
.sheet-overlay.open { display: flex; }

.sheet {
  background: var(--bg2);
  border-radius: 22px 22px 0 0;
  padding: 0 20px calc(var(--safe-bot) + 20px);
  width: 100%;
  animation: slideUp .25s cubic-bezier(0.34,1.2,0.64,1);
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.sheet-handle {
  width: 36px; height: 4px;
  background: var(--surface); border-radius: 100px;
  margin: 12px auto 20px;
}
.sheet-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 20px; }

.field { margin-bottom: 14px; }
.field label { display: block; font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--ink3); margin-bottom: 7px; }
.field input, .field textarea {
  width: 100%;
  background: var(--bg3);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 13px 14px;
  font-family: 'Instrument Sans', sans-serif;
  font-size: 16px; /* 16px empêche le zoom sur iOS */
  color: var(--ink); outline: none;
}
.field input:focus, .field textarea:focus { border-color: var(--accent); }
.field textarea { resize: none; height: 80px; }

.sheet-actions { display: flex; gap: 10px; margin-top: 18px; }
.s-cancel {
  background: transparent; border: 1px solid rgba(255,255,255,0.12);
  border-radius: 100px; padding: 14px 20px;
  font-size: 14px; color: var(--ink2); cursor: pointer;
}
.s-save {
  flex: 1; border: none; border-radius: 100px; padding: 14px;
  font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer;
}
.s-save.gold { background: var(--accent); color: var(--bg); }
.s-save.green { background: var(--green); color: var(--bg); }

/* Confirm sheet */
.confirm-sheet {
  background: var(--bg2); border-radius: 22px 22px 0 0;
  padding: 0 20px calc(var(--safe-bot) + 24px);
  width: 100%;
  animation: slideUp .25s cubic-bezier(0.34,1.2,0.64,1);
  text-align: center;
}
.conf-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.conf-sub { font-size: 14px; color: var(--ink2); margin-bottom: 20px; }
.conf-acts { display: flex; gap: 10px; }
.s-del { flex:1; background: var(--red); color: #fff; border: none; border-radius: 100px; padding: 14px; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; }

/* Toast */
#toast {
  position: fixed; bottom: calc(var(--safe-bot) + 90px); left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: var(--surface); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 100px; padding: 10px 20px;
  font-size: 13px; color: var(--ink);
  opacity: 0; transition: all .3s; z-index: 9999; white-space: nowrap;
  pointer-events: none;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ===== SCREEN: HOME ===== -->
<div class="screen active" id="screen-home">
  <div class="topbar">
    <div class="topbar-title">mes <span>dettes</span></div>
  </div>
  <div class="scroll" id="home-scroll">
    <div class="home-banner">
      <div class="home-banner-lbl">Total restant dû</div>
      <div class="home-banner-val" id="grand-total">0,00 €</div>
      <div class="home-banner-sub" id="grand-sub">0 personne active</div>
    </div>
    <div class="section-title" id="sec-title" style="display:none">Personnes</div>
    <div id="people-list"></div>
  </div>
  <button class="fab" onclick="openAddPerson()">+</button>
</div>

<!-- ===== SCREEN: DETAIL ===== -->
<div class="screen" id="screen-detail">
  <div class="topbar">
    <button class="icon-btn" onclick="goHome()">←</button>
    <div class="topbar-title" id="d-topbar-name"></div>
    <div style="width:38px"></div>
  </div>

  <div style="flex-shrink:0">
    <div class="detail-hero">
      <div class="detail-av" id="d-av"></div>
      <div>
        <div class="detail-name" id="d-name"></div>
        <div class="detail-since" id="d-since"></div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat"><div class="stat-lbl">Prêté</div><div class="stat-val lent" id="s-lent">0 €</div></div>
      <div class="stat"><div class="stat-lbl">Remboursé</div><div class="stat-val repaid" id="s-repaid">0 €</div></div>
      <div class="stat"><div class="stat-lbl">Restant</div><div class="stat-val rem" id="s-rem">0 €</div></div>
    </div>

    <div class="prog-wrap" id="prog-wrap" style="display:none">
      <div class="prog-top">
        <span class="prog-lbl">Remboursement</span>
        <span class="prog-pct" id="prog-pct">0%</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>

    <div class="action-row">
      <button class="btn-lend" onclick="openLend()">💸 Prêt</button>
      <button class="btn-repay" onclick="openRepay()">💰 Remboursement</button>
    </div>
  </div>

  <div class="scroll" id="detail-scroll">
    <div id="cleared-banner" style="display:none" class="cleared"><span style="font-size:18px">🎉</span> Tout est remboursé !</div>
    <div class="tx-section">
      <div class="tx-sec-title">Prêts</div>
      <div id="list-lend"></div>
    </div>
    <div class="tx-section">
      <div class="tx-sec-title">Remboursements</div>
      <div id="list-repay"></div>
    </div>
    <button class="del-person-btn" onclick="askDelPerson()">Supprimer cette personne</button>
  </div>
</div>

<!-- SHEET: Nouvelle personne -->
<div class="sheet-overlay" id="sh-person">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Nouvelle personne</div>
    <div class="field"><label>Prénom / Nom *</label><input id="f-pname" type="text" placeholder="Ex: Thomas"></div>
    <div class="sheet-actions">
      <button class="s-cancel" onclick="closeSheet('sh-person')">Annuler</button>
      <button class="s-save gold" onclick="savePerson()">Créer</button>
    </div>
  </div>
</div>

<!-- SHEET: Prêt -->
<div class="sheet-overlay" id="sh-lend">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Ajouter un prêt</div>
    <div class="field"><label>Montant (€) *</label><input id="f-lamt" type="number" inputmode="decimal" placeholder="50"></div>
    <div class="field"><label>Date</label><input id="f-ldate" type="date"></div>
    <div class="field"><label>Description</label><textarea id="f-lnote" placeholder="Dîner, billet, avance…"></textarea></div>
    <div class="sheet-actions">
      <button class="s-cancel" onclick="closeSheet('sh-lend')">Annuler</button>
      <button class="s-save gold" onclick="saveLend()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- SHEET: Remboursement -->
<div class="sheet-overlay" id="sh-repay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Remboursement reçu</div>
    <div class="field"><label>Montant (€) *</label><input id="f-ramt" type="number" inputmode="decimal" placeholder="20"></div>
    <div class="field"><label>Date</label><input id="f-rdate" type="date"></div>
    <div class="field"><label>Description</label><textarea id="f-rnote" placeholder="Virement, liquide…"></textarea></div>
    <div class="sheet-actions">
      <button class="s-cancel" onclick="closeSheet('sh-repay')">Annuler</button>
      <button class="s-save green" onclick="saveRepay()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- SHEET: Confirmer -->
<div class="sheet-overlay" id="sh-confirm">
  <div class="confirm-sheet">
    <div class="sheet-handle"></div>
    <div style="font-size:36px;margin-bottom:12px" id="conf-ico">⚠️</div>
    <div class="conf-title" id="conf-title">Confirmer ?</div>
    <div class="conf-sub" id="conf-sub"></div>
    <div class="conf-acts">
      <button class="s-cancel" onclick="closeSheet('sh-confirm')">Annuler</button>
      <button class="s-del" onclick="doConfirm()">Supprimer</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let db = JSON.parse(localStorage.getItem('md4') || '{"people":[]}');
let cur = null;
let pendingAction = null;

const save = () => localStorage.setItem('md4', JSON.stringify(db));
const today = () => new Date().toISOString().slice(0,10);
const inits = n => n.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2);
const fmt = n => n.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
const fmtD = d => { if(!d) return ''; const [y,m,j]=d.split('-'); return `${j}/${m}/${y}`; };

const PALS = [
  ['#3A2E1A','#E8A040'],['#1A2E2A','#4CAF82'],['#2E1A2E','#C87AD0'],
  ['#1A1E2E','#6A8AE0'],['#2A1A1A','#E07040'],['#1A2A2E','#40C8C0'],
  ['#2E2218','#D4A060'],['#182E20','#60C890']
];
const pal = name => { let h=0; for(let c of name) h=(h*31+c.charCodeAt(0))&0xffff; return PALS[h%PALS.length]; };

const bal = p => {
  const lent = p.tx.filter(t=>t.type==='lend').reduce((s,t)=>s+t.amt,0);
  const repaid = p.tx.filter(t=>t.type==='repay').reduce((s,t)=>s+t.amt,0);
  return { lent, repaid, rem: Math.max(0, lent-repaid) };
};

// TOAST
const toast = msg => {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2500);
};

// SHEETS
const closeSheet = id => document.getElementById(id).classList.remove('open');
document.querySelectorAll('.sheet-overlay').forEach(o =>
  o.addEventListener('click', e => { if(e.target===o) o.classList.remove('open'); })
);

// SCREENS
function goHome() {
  document.getElementById('screen-detail').classList.remove('active');
  document.getElementById('screen-home').classList.add('active');
  renderHome();
}

function goDetail(id) {
  cur = id;
  document.getElementById('screen-home').classList.remove('active');
  document.getElementById('screen-detail').classList.add('active');
  document.getElementById('detail-scroll').scrollTop = 0;
  renderDetail();
}

// ADD PERSON
function openAddPerson() {
  document.getElementById('f-pname').value = '';
  document.getElementById('sh-person').classList.add('open');
  setTimeout(()=>document.getElementById('f-pname').focus(), 300);
}

function savePerson() {
  const name = document.getElementById('f-pname').value.trim();
  if (!name) return;
  const p = { id: Date.now(), name, created: today(), tx: [] };
  db.people.push(p);
  save(); closeSheet('sh-person');
  toast(name + ' ajouté·e !');
  goDetail(p.id);
}

// LEND
function openLend() {
  document.getElementById('f-lamt').value = '';
  document.getElementById('f-ldate').value = today();
  document.getElementById('f-lnote').value = '';
  document.getElementById('sh-lend').classList.add('open');
  setTimeout(()=>document.getElementById('f-lamt').focus(), 300);
}
function saveLend() {
  const amt = parseFloat(document.getElementById('f-lamt').value);
  if (!amt || amt<=0) return;
  db.people.find(x=>x.id===cur).tx.push({
    id: Date.now(), type:'lend', amt,
    date: document.getElementById('f-ldate').value,
    note: document.getElementById('f-lnote').value.trim()
  });
  save(); closeSheet('sh-lend'); renderDetail(); renderHome();
  toast('Prêt de ' + fmt(amt) + ' enregistré');
}

// REPAY
function openRepay() {
  document.getElementById('f-ramt').value = '';
  document.getElementById('f-rdate').value = today();
  document.getElementById('f-rnote').value = '';
  document.getElementById('sh-repay').classList.add('open');
  setTimeout(()=>document.getElementById('f-ramt').focus(), 300);
}
function saveRepay() {
  const amt = parseFloat(document.getElementById('f-ramt').value);
  if (!amt || amt<=0) return;
  db.people.find(x=>x.id===cur).tx.push({
    id: Date.now(), type:'repay', amt,
    date: document.getElementById('f-rdate').value,
    note: document.getElementById('f-rnote').value.trim()
  });
  save(); closeSheet('sh-repay'); renderDetail(); renderHome();
  toast(fmt(amt) + ' de remboursement enregistré');
}

// DELETE TX
function askDelTx(txId) {
  pendingAction = { type:'tx', txId };
  document.getElementById('conf-ico').textContent = '🗑️';
  document.getElementById('conf-title').textContent = 'Supprimer ?';
  document.getElementById('conf-sub').textContent = 'Cette transaction sera supprimée définitivement.';
  document.getElementById('sh-confirm').classList.add('open');
}

// DELETE PERSON
function askDelPerson() {
  pendingAction = { type:'person' };
  const p = db.people.find(x=>x.id===cur);
  document.getElementById('conf-ico').textContent = '👤';
  document.getElementById('conf-title').textContent = 'Supprimer ' + p.name + ' ?';
  document.getElementById('conf-sub').textContent = 'Toutes les transactions seront supprimées.';
  document.getElementById('sh-confirm').classList.add('open');
}

function doConfirm() {
  if (!pendingAction) return;
  if (pendingAction.type === 'tx') {
    db.people.find(x=>x.id===cur).tx = db.people.find(x=>x.id===cur).tx.filter(t=>t.id!==pendingAction.txId);
    save(); closeSheet('sh-confirm'); renderDetail(); renderHome();
    toast('Transaction supprimée');
  } else {
    db.people = db.people.filter(x=>x.id!==cur);
    save(); closeSheet('sh-confirm');
    toast('Personne supprimée');
    goHome();
  }
  pendingAction = null;
}

// RENDER HOME
function renderHome() {
  const total = db.people.reduce((s,p)=>s+bal(p).rem, 0);
  const active = db.people.filter(p=>bal(p).rem>0).length;
  document.getElementById('grand-total').textContent = fmt(total);
  document.getElementById('grand-sub').textContent = active + ' personne' + (active!==1?'s':'') + ' active' + (active!==1?'s':'');

  const list = document.getElementById('people-list');
  const secTitle = document.getElementById('sec-title');

  if (!db.people.length) {
    secTitle.style.display = 'none';
    list.innerHTML = `<div class="empty-state">
      <span class="empty-ico">💸</span>
      <div class="empty-title">Personne à suivre</div>
      <div class="empty-sub">Appuie sur + pour ajouter<br>quelqu'un qui te doit de l'argent.</div>
    </div>`;
    return;
  }

  secTitle.style.display = 'block';
  const sorted = [...db.people].sort((a,b) => bal(b).rem - bal(a).rem);
  list.innerHTML = sorted.map(p => {
    const b = bal(p);
    const [bg,fg] = pal(p.name);
    const clear = b.rem <= 0;
    return `<div class="person-card" onclick="goDetail(${p.id})">
      <div class="av" style="background:${bg};color:${fg}">${inits(p.name)}</div>
      <div class="pc-info">
        <div class="pc-name">${p.name}</div>
        <div class="pc-bal ${clear?'clear':'owed'}">${clear ? 'Tout remboursé ✓' : 'Doit encore ' + fmt(b.rem)}</div>
      </div>
      <div class="pc-right">
        <div class="pc-amt ${clear?'clear':''}">${clear ? '✓' : fmt(b.rem)}</div>
      </div>
      <span class="chevron">›</span>
    </div>`;
  }).join('');
}

// RENDER DETAIL
function renderDetail() {
  if (!cur) return;
  const p = db.people.find(x=>x.id===cur);
  if (!p) return;
  const b = bal(p);
  const [bg,fg] = pal(p.name);
  const pct = b.lent>0 ? Math.min(100,Math.round(b.repaid/b.lent*100)) : 0;

  document.getElementById('d-topbar-name').textContent = p.name;
  document.getElementById('d-av').textContent = inits(p.name);
  document.getElementById('d-av').style.background = bg;
  document.getElementById('d-av').style.color = fg;
  document.getElementById('d-name').textContent = p.name;
  document.getElementById('d-since').textContent = 'Depuis le ' + fmtD(p.created);

  document.getElementById('s-lent').textContent = fmt(b.lent);
  document.getElementById('s-repaid').textContent = fmt(b.repaid);
  document.getElementById('s-rem').textContent = fmt(b.rem);

  if (b.lent > 0) {
    document.getElementById('prog-wrap').style.display = 'block';
    document.getElementById('prog-pct').textContent = pct + '%';
    document.getElementById('prog-fill').style.width = pct + '%';
  } else {
    document.getElementById('prog-wrap').style.display = 'none';
  }

  document.getElementById('cleared-banner').style.display = (b.rem<=0 && b.lent>0) ? 'flex' : 'none';

  const txs = [...p.tx].sort((a,z)=>z.id-a.id);
  const lends = txs.filter(t=>t.type==='lend');
  const repays = txs.filter(t=>t.type==='repay');

  const txHTML = (list, type) => !list.length
    ? `<div class="no-tx">Aucune transaction</div>`
    : list.map(t => `<div class="tx">
        <div class="tx-ico ${type}">${type==='lend'?'💸':'💰'}</div>
        <div class="tx-info">
          <div class="tx-note">${t.note||(type==='lend'?'Prêt':'Remboursement')}</div>
          ${t.date?`<div class="tx-date">${fmtD(t.date)}</div>`:''}
        </div>
        <div class="tx-amt ${type}">${fmt(t.amt)}</div>
        <button class="tx-del" onclick="askDelTx(${t.id})">✕</button>
      </div>`).join('');

  document.getElementById('list-lend').innerHTML = txHTML(lends,'lend');
  document.getElementById('list-repay').innerHTML = txHTML(repays,'repay');
}

// INIT
renderHome();
</script>
</body>
</html>
